# EnvironmentNEPAL — News source configuration
# Sources tested from within Nepal. URLs/selectors may need local tuning.

sources:
  - name: "Nepali Times"
    url: "https://nepalitimes.com"
    type: api
    check_frequency_hours: 24
    extractor: nepalitimes_api
    slug_file: "scripts/nepalitimes_slugs.json"
    category_mapping:
      - keywords: ["climate", "weather", "temperature", "warming", "carbon", "emission", "glacier", "monsoon", "el nino"]
        category: climate
      - keywords: ["tiger", "rhino", "elephant", "poaching", "wildlife", "species", "bird", "biodiversity", "habitat", "conservation", "park"]
        category: wildlife
      - keywords: ["forest", "deforestation", "tree", "timber", "jungle", "plantation", "logging", "natural capital"]
        category: forestry
      - keywords: ["river", "lake", "glacier", "water", "wetland", "irrigation", "drinking", "flood", "hydropower"]
        category: water
      - keywords: ["pollution", "air quality", "waste", "plastic", "sewage", "toxic", "chemical", "smog"]
        category: pollution
      - keywords: ["earthquake", "flood", "landslide", "avalanche", "disaster", "fire", "storm", "drought"]
        category: disaster
      - keywords: ["policy", "regulation", "law", "government", "ministry", "act", "agreement", "treaty"]
        category: policy

  - name: "Mongabay Nepal"
    url: "https://news.mongabay.com/list/nepal/"
    type: dynamic
    check_frequency_hours: 24
    extractor: css
    selector: ".article--container"
    fields:
      title: ".title h3"
      url: "a@href"
      snippet: ""
      date: ".date"
    category_mapping:
      - keywords: ["climate", "weather", "temperature", "warming", "carbon"]
        category: climate
      - keywords: ["tiger", "rhino", "elephant", "poaching", "wildlife", "species", "biodiversity"]
        category: wildlife
      - keywords: ["forest", "deforestation", "tree", "timber", "jungle", "plantation"]
        category: forestry
      - keywords: ["river", "lake", "glacier", "water", "wetland"]
        category: water
      - keywords: ["pollution", "air quality", "waste", "plastic"]
        category: pollution
      - keywords: ["earthquake", "flood", "landslide", "disaster", "fire"]
        category: disaster
      - keywords: ["policy", "regulation", "law", "government"]
        category: policy

