# EnvironmentNEPAL — News source configuration
#
# Sources are tested from within Nepal. URLs and CSS selectors may need
# local adjustment. Use --dry flag with scraper.py to verify first.

sources:
  - name: "The Rising Nepal"
    url: "https://risingnepaldaily.com/category/environment"
    note: "Connects from Nepal only — may redirect to old.risingnepaldaily.com"
    type: dynamic
    check_frequency_hours: 12
    extractor: css
    selector: "article"
    fields:
      title: "h2 a, h3 a"
      url: "h2 a@href, h3 a@href"
      snippet: "p"
      date: "time, .date"
    category_mapping:
      - keywords: ["climate", "weather", "temperature", "warming", "carbon", "emission"]
        category: climate
      - keywords: ["tiger", "rhino", "elephant", "poaching", "wildlife", "species", "bird", "biodiversity"]
        category: wildlife
      - keywords: ["forest", "deforestation", "tree", "timber", "jungle", "plantation"]
        category: forestry
      - keywords: ["river", "lake", "glacier", "water", "wetland", "irrigation", "drinking"]
        category: water
      - keywords: ["pollution", "air quality", "waste", "plastic", "sewage", "toxic", "chemical"]
        category: pollution
      - keywords: ["earthquake", "flood", "landslide", "avalanche", "disaster", "fire", "storm"]
        category: disaster
      - keywords: ["policy", "regulation", "law", "government", "ministry", "act", "agreement", "treaty"]
        category: policy

