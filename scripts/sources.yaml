      title: "h3 a"
      url: "h3 a@href"
      snippet: "p"
      date: "time"
    category_mapping:
      - keywords: ["climate", "weather", "temperature", "warming", "carbon", "emission", "greenhouse"]
        category: climate
      - keywords: ["tiger", "rhino", "elephant", "poaching", "wildlife", "species", "bird", "biodiversity", "habitat", "park", "parsa", "chitwan", "conservation"]
        category: wildlife
      - keywords: ["forest", "deforestation", "tree", "timber", "jungle", "plantation", "logging"]
        category: forestry
      - keywords: ["river", "lake", "glacier", "water", "wetland", "pond", "irrigation", "drinking", "flood"]
        category: water
      - keywords: ["pollution", "air quality", "waste", "plastic", "sewage", "toxic", "chemical", "emission"]
        category: pollution
      - keywords: ["earthquake", "flood", "landslide", "avalanche", "disaster", "fire", "storm", "drought"]
        category: disaster
      - keywords: ["policy", "regulation", "law", "government", "ministry", "act", "agreement", "treaty", "budget"]
        category: policy

